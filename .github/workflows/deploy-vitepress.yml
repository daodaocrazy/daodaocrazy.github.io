name: Deploy VitePress

on:
  push:
    branches: [main, lab]
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Environment to deploy
        options:
          - main
          - lab
        default: main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-status: ${{ steps.build-status.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "lab" ] || [ "${GITHUB_REF_NAME}" = "lab" ]; then
            echo "environment=lab" >> $GITHUB_OUTPUT
            echo "base=/lab" >> $GITHUB_OUTPUT
          else
            echo "environment=main" >> $GITHUB_OUTPUT
            echo "base=/" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        id: build
        run: |
          NODE_OPTIONS="--max-old-space-size=4096" BASE_URL="${{ steps.env.outputs.base }}" npm run docs:build
          echo "status=success" >> $GITHUB_OUTPUT
      - name: Verify build output
        if: success()
        run: |
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "::error::Build output not found"
            exit 1
          fi
          ls -la docs/.vitepress/dist
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
