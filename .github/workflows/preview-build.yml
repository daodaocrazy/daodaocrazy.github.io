# VitePress 预构建验证
name: Preview Build Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vitepress-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./vitepress-docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify build output
        run: |
          if [ -d "./docs/.vitepress/dist" ]; then
            echo "✓ Build output found"
            ls -lh ./docs/.vitepress/dist | head -10
            echo "---"
            du -sh ./docs/.vitepress/dist
          else
            echo "✗ Build output not found!"
            exit 1
          fi

      - name: Upload build output for inspection
        if: success()
        run: |
          echo "Attempting to upload build artifact..."
          echo "Build directory: ./docs/.vitepress/dist"
          echo "Directory size:"
          du -sh ./docs/.vitepress/dist || echo "Could not get size"
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-build-${{ github.ref_name }}
          path: ./vitepress-docs/docs/.vitepress/dist
          retention-days: 7
