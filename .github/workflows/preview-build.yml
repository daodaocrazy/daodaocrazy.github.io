# VitePress 预构建验证
name: Preview Build Check

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vitepress-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./vitepress-docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build output for inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-build-${{ github.ref_name }}
          path: ./vitepress-docs/docs/.vitepress/dist
          retention-days: 7
