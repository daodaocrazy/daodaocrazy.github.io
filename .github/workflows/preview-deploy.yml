name: Preview Deploy

on:
  push:
    branches-ignore:
      - main
      - lab
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup preview base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          else
            BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9-]/-/g')
          fi
          echo "branch=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          echo "base=/preview/${BRANCH_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build preview
        run: |
          NODE_OPTIONS="--max-old-space-size=4096" BASE_URL="${{ steps.base.outputs.base }}" npm run docs:build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ steps.base.outputs.branch }}
          path: docs/.vitepress/dist
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview build succeeded!  
              Branch: \`${{ steps.base.outputs.branch }}\``
            });
