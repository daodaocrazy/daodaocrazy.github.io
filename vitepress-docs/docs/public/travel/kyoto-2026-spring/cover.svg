<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyK" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="45%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="toriiRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="hillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <radialGradient id="sunK" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff1f2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f9a8d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="400" fill="url(#skyK)"/>

  <!-- Sun glow -->
  <circle cx="580" cy="120" r="140" fill="url(#sunK)"/>
  <circle cx="580" cy="120" r="38" fill="#fff1f2" opacity="0.9"/>

  <!-- Distant hills -->
  <path d="M0 300 Q 150 240 320 280 T 640 260 T 800 290 L800 400 L0 400 Z" fill="url(#hillGrad)" opacity="0.7"/>
  <path d="M0 330 Q 200 280 400 310 T 800 320 L800 400 L0 400 Z" fill="#be185d" opacity="0.85"/>

  <!-- Torii gate -->
  <g transform="translate(140 170)">
    <!-- Top lintel -->
    <rect x="-80" y="0" width="160" height="18" fill="url(#toriiRed)"/>
    <rect x="-90" y="-8" width="180" height="12" fill="url(#toriiRed)"/>
    <!-- Second lintel -->
    <rect x="-70" y="28" width="140" height="10" fill="url(#toriiRed)"/>
    <!-- Left pillar -->
    <rect x="-62" y="38" width="18" height="150" fill="url(#toriiRed)"/>
    <!-- Right pillar -->
    <rect x="44" y="38" width="18" height="150" fill="url(#toriiRed)"/>
    <!-- Decorative center bar -->
    <rect x="-44" y="55" width="88" height="4" fill="#fecaca" opacity="0.7"/>
    <!-- Highlight -->
    <rect x="-80" y="2" width="160" height="2" fill="#fecaca" opacity="0.7"/>
    <rect x="-60" y="40" width="2" height="145" fill="#fecaca" opacity="0.6"/>
    <rect x="46" y="40" width="2" height="145" fill="#fecaca" opacity="0.6"/>
  </g>

  <!-- Pagoda silhouette on right -->
  <g transform="translate(580 180)" fill="#4c0519" opacity="0.85">
    <!-- Roof tiers -->
    <polygon points="-60,0 60,0 45,15 -45,15"/>
    <rect x="-38" y="15" width="76" height="20"/>
    <polygon points="-50,35 50,35 38,50 -38,50"/>
    <rect x="-30" y="50" width="60" height="18"/>
    <polygon points="-40,68 40,68 30,82 -30,82"/>
    <rect x="-22" y="82" width="44" height="16"/>
    <!-- Base -->
    <polygon points="-50,98 50,98 60,120 -60,120"/>
    <!-- Spire -->
    <polygon points="-4,-10 4,-10 2,0 -2,0" fill="#fecaca"/>
    <circle cx="0" cy="-14" r="4" fill="#fecaca"/>
    <line x1="0" y1="-40" x2="0" y2="-14" stroke="#fecaca" stroke-width="1.5"/>
    <!-- Window dots -->
    <rect x="-18" y="22" width="6" height="8" fill="#fecaca" opacity="0.6"/>
    <rect x="12" y="22" width="6" height="8" fill="#fecaca" opacity="0.6"/>
    <rect x="-14" y="56" width="6" height="8" fill="#fecaca" opacity="0.6"/>
    <rect x="8" y="56" width="6" height="8" fill="#fecaca" opacity="0.6"/>
    <rect x="-10" y="88" width="6" height="8" fill="#fecaca" opacity="0.6"/>
    <rect x="4" y="88" width="6" height="8" fill="#fecaca" opacity="0.6"/>
  </g>

  <!-- Cherry blossom branches -->
  <g fill="none" stroke="#9d174d" stroke-width="2" opacity="0.7">
    <path d="M 0 150 Q 80 130 160 150 T 320 155 Q 400 160 480 150" />
    <path d="M 80 148 Q 95 120 110 100" />
    <path d="M 180 152 Q 195 125 215 105" />
    <path d="M 260 153 Q 280 130 305 115" />
    <path d="M 380 152 Q 400 128 425 110" />
  </g>

  <!-- Cherry blossom clusters -->
  <g>
    <!-- Cluster 1 -->
    <g transform="translate(100 120)">
      <circle cx="0" cy="0" r="8" fill="url(#petalGrad)"/>
      <circle cx="-7" cy="-6" r="6" fill="url(#petalGrad)"/>
      <circle cx="7" cy="-6" r="6" fill="url(#petalGrad)"/>
      <circle cx="-5" cy="6" r="5" fill="url(#petalGrad)"/>
      <circle cx="5" cy="6" r="5" fill="url(#petalGrad)"/>
      <circle cx="0" cy="-10" r="3" fill="#fdf2f8"/>
    </g>
    <!-- Cluster 2 -->
    <g transform="translate(200 125)">
      <circle cx="0" cy="0" r="10" fill="url(#petalGrad)"/>
      <circle cx="-9" cy="-7" r="7" fill="url(#petalGrad)"/>
      <circle cx="9" cy="-7" r="7" fill="url(#petalGrad)"/>
      <circle cx="-7" cy="8" r="6" fill="url(#petalGrad)"/>
      <circle cx="7" cy="8" r="6" fill="url(#petalGrad)"/>
    </g>
    <!-- Cluster 3 -->
    <g transform="translate(290 128)">
      <circle cx="0" cy="0" r="8" fill="url(#petalGrad)"/>
      <circle cx="-7" cy="-5" r="6" fill="url(#petalGrad)"/>
      <circle cx="7" cy="-5" r="6" fill="url(#petalGrad)"/>
      <circle cx="-5" cy="7" r="5" fill="url(#petalGrad)"/>
      <circle cx="5" cy="7" r="5" fill="url(#petalGrad)"/>
    </g>
    <!-- Cluster 4 -->
    <g transform="translate(400 122)">
      <circle cx="0" cy="0" r="9" fill="url(#petalGrad)"/>
      <circle cx="-8" cy="-6" r="7" fill="url(#petalGrad)"/>
      <circle cx="8" cy="-6" r="7" fill="url(#petalGrad)"/>
      <circle cx="-6" cy="7" r="5" fill="url(#petalGrad)"/>
      <circle cx="6" cy="7" r="5" fill="url(#petalGrad)"/>
    </g>

    <!-- Scattered small petals in top -->
    <circle cx="60" cy="90" r="4" fill="#fdf2f8" opacity="0.9"/>
    <circle cx="140" cy="80" r="3" fill="#fbcfe8" opacity="0.8"/>
    <circle cx="250" cy="95" r="4" fill="#fdf2f8" opacity="0.9"/>
    <circle cx="340" cy="85" r="3" fill="#fbcfe8" opacity="0.8"/>
    <circle cx="460" cy="95" r="4" fill="#fdf2f8" opacity="0.9"/>
    <circle cx="520" cy="80" r="3" fill="#fbcfe8" opacity="0.8"/>
    <circle cx="680" cy="95" r="4" fill="#fdf2f8" opacity="0.9"/>
    <circle cx="740" cy="120" r="3" fill="#fbcfe8" opacity="0.8"/>
    <!-- Falling petals -->
    <ellipse cx="180" cy="240" rx="3" ry="5" fill="#fdf2f8" transform="rotate(30 180 240)" opacity="0.85"/>
    <ellipse cx="320" cy="260" rx="3" ry="5" fill="#fbcfe8" transform="rotate(-20 320 260)" opacity="0.8"/>
    <ellipse cx="440" cy="280" rx="3" ry="5" fill="#fdf2f8" transform="rotate(45 440 280)" opacity="0.85"/>
    <ellipse cx="540" cy="250" rx="3" ry="5" fill="#fbcfe8" transform="rotate(-30 540 250)" opacity="0.8"/>
    <ellipse cx="640" cy="280" rx="3" ry="5" fill="#fdf2f8" transform="rotate(15 640 280)" opacity="0.85"/>
    <ellipse cx="720" cy="240" rx="3" ry="5" fill="#fbcfe8" transform="rotate(-40 720 240)" opacity="0.8"/>
    <ellipse cx="220" cy="300" rx="3" ry="5" fill="#fdf2f8" transform="rotate(25 220 300)" opacity="0.75"/>
    <ellipse cx="380" cy="320" rx="3" ry="5" fill="#fbcfe8" transform="rotate(-25 380 320)" opacity="0.7"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="370" width="800" height="30" fill="#831843" opacity="0.7"/>

  <!-- Text label -->
  <g transform="translate(480 215)">
    <text x="0" y="0" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="50" font-weight="900" fill="#fff1f2" letter-spacing="4">关西樱花</text>
    <text x="2" y="40" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#fbcfe8" letter-spacing="2">KYOTO · SPRING</text>
    <line x1="0" y1="58" x2="300" y2="58" stroke="#fbcfe8" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="80" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#fce7f3" letter-spacing="1.5" opacity="0.95">京都 · 宇治 · 大阪</text>
  </g>
</svg>
