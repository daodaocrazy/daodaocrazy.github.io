    <text x="2" y="42" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="500" fill="#fbcfe8" letter-spacing="2">TOKYO · 3 DAYS</text>
