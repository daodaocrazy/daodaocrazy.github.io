    <text x="0" y="82" font-family="'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#f5d0fe" letter-spacing="1.5" opacity="0.9">浅草 · 原宿 · 涩谷 · 新宿 · 台场</text>
